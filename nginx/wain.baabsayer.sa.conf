# ─────────────────────────────────────────────────────────────────────────────
# Wain reverse-proxy server block for nginx on the host.
#
# Pair with `.env` values on the server:
#     NEXT_PUBLIC_API_URL=https://wain.baabsayer.sa/api
#     APP_BASE_URL=https://wain.baabsayer.sa
# (Both are baked into the web + admin images at build time — rebuild after
# changing them: `docker compose up -d --build web admin`.)
#
# Wain's Caddy listens on http://127.0.0.1:8787 — change the upstream port if
# you set HTTP_PORT to something else in the Wain `.env`.
#
# Install:
#     sudo cp nginx/wain.baabsayer.sa.conf /etc/nginx/sites-available/
#     sudo ln -sf /etc/nginx/sites-available/wain.baabsayer.sa.conf \
#                 /etc/nginx/sites-enabled/wain.baabsayer.sa.conf
#     sudo nginx -t && sudo systemctl reload nginx
#
# First-time TLS cert (if you don't already issue it elsewhere):
#     sudo certbot --nginx -d wain.baabsayer.sa
# ─────────────────────────────────────────────────────────────────────────────

upstream wain_caddy {
    server 127.0.0.1:8787;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wain.baabsayer.sa;

    ssl_certificate     /etc/letsencrypt/live/wain.baabsayer.sa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wain.baabsayer.sa/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Floor-plan / logo uploads are base64 JSON; Wain's API caps the body at
    # 10mb, so nginx must allow at least the same. Leave a small margin.
    client_max_body_size 12m;
    proxy_read_timeout    60s;
    proxy_buffering        off;

    access_log /var/log/nginx/wain.baabsayer.sa.access.log;
    error_log  /var/log/nginx/wain.baabsayer.sa.error.log warn;

    location / {
        proxy_pass http://wain_caddy;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Keep upstream connection alive for keepalive pool above.
        proxy_set_header Connection "";
    }
}

# Plain-HTTP → HTTPS redirect (skip if your nginx already has a global one).
server {
    listen 80;
    listen [::]:80;
    server_name wain.baabsayer.sa;
    return 301 https://$host$request_uri;
}
